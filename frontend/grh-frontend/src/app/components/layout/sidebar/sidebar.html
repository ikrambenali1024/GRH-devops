<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <mat-icon>corporate_fare</mat-icon>
    </div>
    <div class="logo-text">
      <span class="logo-name">GRH Platform</span>
      <span class="logo-sub">Gestion RH</span>
    </div>
  </div>

  <div class="role-pill">
    <span class="role-dot"></span>
    {{ getRoleLabel() }}
  </div>

  <nav class="sidebar-nav">
    <div
      *ngFor="let item of getMenu()"
      class="nav-link"
      [class.active]="isActive(item.route)"
      (click)="router.navigate([item.route])">
      <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
      <span class="nav-label">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && item.badge > 0">{{ item.badge }}</span>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">{{ getInitials() }}</div>
      <div class="user-details">
        <span class="user-name">{{ username }}</span>
        <span class="user-role">{{ getRoleLabel() }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" title="Déconnexion">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</aside>
