<mat-toolbar color="primary">
  <button mat-icon-button (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <span>Gestion des Présences</span>
</mat-toolbar>
<div class="container">
  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <table mat-table [dataSource]="attendances" *ngIf="!loading" class="mat-elevation-z2">

    <ng-container matColumnDef="employee">
      <th mat-header-cell *matHeaderCellDef>Employé</th>
      <td mat-cell *matCellDef="let att">
        {{ att.employee?.firstName }} {{ att.employee?.lastName }}
      </td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let att">{{ att.attendanceDate }}</td>
    </ng-container>

    <ng-container matColumnDef="checkIn">
      <th mat-header-cell *matHeaderCellDef>Arrivée</th>
      <td mat-cell *matCellDef="let att">{{ att.checkIn }}</td>
    </ng-container>

    <ng-container matColumnDef="checkOut">
      <th mat-header-cell *matHeaderCellDef>Départ</th>
      <td mat-cell *matCellDef="let att">{{ att.checkOut || '—' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Statut</th>
      <td mat-cell *matCellDef="let att">
        <mat-chip [color]="getStatusColor(att.status)" selected>
          {{ att.status }}
        </mat-chip>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="!loading && attendances.length === 0" class="empty">
    Aucun pointage trouvé.
  </p>
</div>
